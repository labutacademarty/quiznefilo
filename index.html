<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Quiznéfilo - P2P Sync & Soborno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; margin: 0; padding: 0; overflow: hidden; background-color: #000000; }
        .text-cinema { font-family: 'Cinzel', serif; }
        .neon-border { box-shadow: 0 0 15px rgba(245, 158, 11, 0.4), inset 0 0 15px rgba(245, 158, 11, 0.2); border: 2px solid rgba(245, 158, 11, 0.7); }
        .animate-pulse-gold { animation: pulse-gold 2s infinite ease-in-out; }
        @keyframes pulse-gold { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.02); opacity: 0.85; } }
        .ruleta-transition { transition: transform 4.5s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .confetti-particle { position: absolute; width: 12px; height: 12px; animation: confetti-fall 4s linear infinite; pointer-events: none; z-index: 40; }
        @keyframes confetti-fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body class="text-white select-none">

    <div id="setup-screen" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-50 p-6">
        <h1 class="text-cinema text-6xl text-amber-500 mb-10">EL QUIZNÉFILO</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="setRole('overlay')" class="p-8 bg-slate-900 border border-slate-700 rounded-2xl hover:border-amber-500">Overlay (OBS)</button>
            <button onclick="setRole('control')" class="p-8 bg-slate-900 border border-slate-700 rounded-2xl hover:border-amber-500">Panel Control</button>
        </div>
    </div>

    <div id="overlay-view" class="hidden absolute inset-0 w-[1920px] h-[1080px] pointer-events-none overflow-hidden">
        <div class="absolute top-10 left-12 flex items-center space-x-3 px-6 py-2 bg-slate-950/80 rounded-xl border border-amber-500/40 neon-border">
            <span class="text-cinema font-extrabold text-2xl text-amber-500">EL QUIZNÉFILO</span>
        </div>
        <div id="ov-question-block" class="absolute bottom-24 left-12 right-12 transition-all duration-500 opacity-0">
            <div class="w-full px-8 py-5 bg-slate-950/90 border-2 border-amber-500/60 rounded-2xl">
                <h2 id="ov-question-text" class="text-2xl font-bold">Cargando...</h2>
            </div>
            <div id="ov-prize-container" class="hidden absolute inset-0 flex items-center justify-center z-30">
                <div class="p-10 bg-slate-950 border-4 border-purple-500 rounded-3xl text-center">
                    <div id="ov-prize-emoji" class="text-8xl"></div>
                    <h3 id="ov-prize-title" class="text-4xl font-black text-purple-400"></h3>
                </div>
            </div>
        </div>
        <div id="ov-confetti-area" class="absolute inset-0 overflow-hidden pointer-events-none"></div>
    </div>

    <div id="control-view" class="hidden min-h-screen bg-slate-950 p-6">
        <h1 class="text-3xl font-bold text-amber-500 mb-6">PANEL DE CONTROL</h1>
        <button onclick="sendQuestionToOverlay()" class="w-full py-4 bg-amber-500 text-black font-black rounded-xl mb-4">🚀 Lanzar a OBS</button>
        
        <button onclick="acceptSoborno()" class="w-full py-4 bg-purple-600 hover:bg-purple-500 text-white font-black rounded-xl uppercase shadow-lg mb-6">
            💸 ACEPTAR SOBORNO (Recuperar Comodines)
        </button>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="resolveAnswer(true)" class="py-4 bg-emerald-600 text-white font-bold rounded-xl">¡ACIERTO!</button>
            <button onclick="resolveAnswer(false)" class="py-4 bg-red-600 text-white font-bold rounded-xl">¡FALLO!</button>
        </div>
    </div>

    <script>
        const pubsubURL = "https://v3.pjax.com/pubsub/sotano_marty_doc_quiznefilo_room";
        let gameState = { currentIdx: 0, questions: [], overlayVisible: false, prizeActive: false, wildcard_llamada_used: false, wildcard_chat_used: false, wildcard_ruleta_used: false };
        let currentRole = "";

        const eventSource = new EventSource(pubsubURL);
        eventSource.onmessage = (e) => {
            const packet = JSON.parse(e.data);
            if (packet.sender !== currentRole) { gameState = packet.state; applyStateToUI(); }
        };

        function transmit() {
            fetch(pubsubURL, { method: 'POST', body: JSON.stringify({ sender: currentRole, state: gameState }) });
            applyStateToUI();
        }

        function acceptSoborno() {
            gameState.wildcard_llamada_used = false;
            gameState.wildcard_chat_used = false;
            gameState.wildcard_ruleta_used = false;
            gameState.prizeActive = true;
            gameState.activePrizeData = { emoji: "💸", title: "¡SOBORNO ACEPTADO!", desc: "Comodines restaurados." };
            transmit();
        }

        function applyStateToUI() { /* ... lógica de UI ... */ }
        function setRole(role) { window.location.hash = role; location.reload(); }
        
        // ... resto de funciones (resolveAnswer, sendQuestionToOverlay, etc) ...
    </script>
</body>
</html>
